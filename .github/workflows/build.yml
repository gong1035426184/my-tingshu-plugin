name: BuildJar
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # 必须是 17，解决之前 image_789efa 的报错
        distribution: 'temurin'
      with:
        gradle-version: 8.10  # 加上这一行，强制指定版本
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build with Gradle
      run: gradle jar --no-daemon
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: 18ts-plugin
        path: build/libs/18ts.jar
