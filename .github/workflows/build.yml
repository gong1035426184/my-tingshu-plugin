name: BuildJar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      # 使用更稳妥的命令
      run: gradle jar --no-daemon

    - name: Upload JAR
      uses: actions/upload-artifact@v3
      with:
        name: my-plugin
        path: build/libs/18ts.jar
