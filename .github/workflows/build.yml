name: BuildJar
on: [push, workflow_dispatch] # 当你提交代码或手动点击时触发
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Run Build
        run: |
          chmod +x gradlew
          ./gradlew jar
          
      - name: Save Result
        uses: actions/upload-artifact@v3
        with:
          name: tingshu-jar
          path: build/libs/*.jar # 打包成功后，把这个文件提取出来供你下载
