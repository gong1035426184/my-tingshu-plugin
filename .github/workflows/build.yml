name: BuildJar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # 必须是 v4
      with:
        java-version: '17' # 必须是 17，解决 major version 65 报错
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      run: gradle jar --no-daemon

    - name: Upload JAR
      uses: actions/upload-artifact@v4 # 必须是 v4
      with:
        name: 18ts-plugin
        path: build/libs/18ts.jar
