name: BuildJar

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10  # 强制指定 8.10 版本，解决 WrapUtil 报错

      - name: Build with Gradle
        run: ./gradlew jar --no-daemon || gradle jar --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: 18ts-plugin
          path: build/libs/18ts.jar
