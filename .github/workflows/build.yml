name: BuildJar

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build with Gradle
      # 增加 --stacktrace 参数，如果报错，它会告诉我们具体的行号
      run: gradle jar --stacktrace
    - name: Upload JAR
      uses: actions/upload-artifact@v3
      with:
        name: my-plugin
        path: build/libs/18ts.jar
