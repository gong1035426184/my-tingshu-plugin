name: BuildJar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4  # 升级到 v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4 # 升级到 v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # 这是目前的稳定版

    - name: Build with Gradle
      run: gradle jar --no-daemon

    - name: Upload JAR
      uses: actions/upload-artifact@v4 # 必须是 v4，彻底解决 image_7a0edf 中的报错
      with:
        name: my-plugin
        path: build/libs/18ts.jar
