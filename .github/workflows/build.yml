name: BuildJar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build with Gradle
      # 关键：直接用系统 gradle，不用 ./gradlew
      run: gradle jar
    - name: Upload JAR
      uses: actions/upload-artifact@v3
      with:
        name: my-plugin
        path: build/libs/*.jar
